<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinical VarOps v7.0 - High Contrast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #0f172a; }
        
        .table-card {
            background: white;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border-radius: 12px;
        }

        .table-input {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 8px 12px;
            width: 100%;
            font-weight: 500;
            transition: all 0.2s;
        }
        .table-input:focus {
            background: white;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            outline: none;
        }

        .btn-action {
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        
        #drawer {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: 1px solid #e2e8f0;
        }

        .tag {
            background: #1e293b;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
    </style>
</head>
<body class="min-h-screen">

    <header class="bg-slate-900 text-white sticky top-0 z-50 px-6 py-4 shadow-xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-blue-500 p-2 rounded-lg text-white font-bold text-xl">⚕️</div>
                <div>
                    <h1 class="text-lg font-bold leading-none">Clinical VarOps</h1>
                    <p class="text-[10px] text-blue-300 font-bold uppercase tracking-widest mt-1">v7.0 Precision Standard</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="document.getElementById('fileIn').click()" class="px-3 py-2 text-[10px] font-bold hover:bg-slate-800 rounded-lg transition">ABRIR</button>
                <button onclick="VarOpsApp.exportData()" class="px-3 py-2 text-[10px] font-bold hover:bg-slate-800 rounded-lg transition">GUARDAR</button>
                <button onclick="VarOpsApp.resetSystem()" class="px-3 py-2 text-[10px] font-bold text-red-400 hover:bg-red-900/30 rounded-lg transition">REINICIAR</button>
                <button onclick="VarOpsApp.copyToWord()" class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2 rounded-lg text-[10px] font-bold uppercase shadow-lg ml-4 transition">Copiar para Word</button>
                <input type="file" id="fileIn" class="hidden" accept=".clinical" onchange="VarOpsApp.importData(event)">
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-10">
        <!-- Header del Proyecto -->
        <section class="mb-8 grid grid-cols-1 md:grid-cols-3 gap-6 bg-white p-8 rounded-2xl border border-slate-200 shadow-sm">
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2">Título de la Investigación</label>
                <input type="text" id="p-name" oninput="VarOpsApp.updateProj('name', this.value)" class="table-input text-lg font-bold text-slate-900" placeholder="Nombre del protocolo">
            </div>
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2">Especialidad Médica</label>
                <input type="text" id="p-spec" oninput="VarOpsApp.updateProj('specialty', this.value)" class="table-input text-lg font-bold text-slate-900" placeholder="Ej: Pediatría">
            </div>
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2">Fecha</label>
                <input type="date" id="p-date" oninput="VarOpsApp.updateProj('date', this.value)" class="table-input text-lg font-bold text-slate-500">
            </div>
        </section>

        <!-- Tabla de Variables -->
        <div class="table-card overflow-hidden">
            <table class="w-full border-collapse text-left">
                <thead class="bg-slate-100 border-b border-slate-200">
                    <tr class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">
                        <th class="p-5 w-16 text-center">Ord.</th>
                        <th class="p-5 w-56">Variable</th>
                        <th class="p-5 w-48">Tipo</th>
                        <th class="p-5">Escala / Valores</th>
                        <th class="p-5">Descripción Operacional</th>
                        <th class="p-5 w-32 text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody id="rows" class="bg-white">
                    <!-- Dinámico -->
                </tbody>
            </table>

            <!-- Empty State -->
            <div id="empty-state" class="hidden py-24 text-center bg-slate-50/50">
                <div class="text-4xl mb-4">📑</div>
                <h3 class="text-lg font-bold text-slate-800">No hay variables registradas</h3>
                <p class="text-sm text-slate-500">Use los botones de abajo para comenzar.</p>
            </div>

            <!-- Footer Tabla -->
            <div class="p-6 bg-slate-50 border-t border-slate-200 flex justify-between items-center">
                <div class="flex gap-3">
                    <button onclick="VarOpsApp.addNewVar()" class="bg-slate-900 text-white px-6 py-3 rounded-xl font-bold text-xs hover:bg-black transition-all shadow-md">
                        + Nueva Variable
                    </button>
                    <div class="relative">
                        <button id="lib-btn" onclick="VarOpsApp.toggleLibrary()" class="bg-white border border-slate-300 text-slate-700 px-6 py-3 rounded-xl font-bold text-xs hover:bg-slate-50 transition-all flex items-center gap-2">
                            ⚕️ Catálogo Común
                        </button>
                        <div id="lib-menu" class="hidden absolute left-0 bottom-full mb-3 bg-white border border-slate-200 rounded-2xl shadow-2xl p-2 w-80 z-50 max-h-96 overflow-y-auto">
                        </div>
                    </div>
                </div>
                <div id="progress-counter" class="text-[10px] font-bold text-slate-500 bg-white border border-slate-200 px-4 py-2 rounded-lg uppercase">
                    0 / 0 COMPLETAS
                </div>
            </div>
        </div>
    </main>

    <!-- Panel Lateral -->
    <div id="overlay" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] opacity-0 pointer-events-none transition-all duration-300" onclick="VarOpsApp.closeDrawer()"></div>
    <div id="drawer" class="fixed top-0 right-0 h-full w-full md:w-[500px] bg-white z-[70] translate-x-full overflow-y-auto p-10 shadow-2xl">
        <div id="drawer-body"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
